services:
  # Development Services
  - type: web
    name: api-justsplitapp-dev
    env: node
    branch: dev
    rootDir: apps/server
    buildCommand: pnpm i --frozen-lockfile && pnpm --filter apps/server build
    startCommand: pnpm --filter apps/server start
    autoDeploy: true
    healthCheck:
      path: /health
      port: 4000
    envVars:
      - key: NODE_ENV
        value: development
      - key: PORT
        value: 4000
      - key: FEATURE_FLAGS
        fromGroup: justsplitapp-dev
      - key: MONGODB_URI
        fromGroup: justsplitapp-dev
      - key: JWT_SECRET
        fromGroup: justsplitapp-dev
      - key: FOURSQUARE_API_KEY
        fromGroup: justsplitapp-dev
      - key: CURRENCY_PROVIDER
        value: frankfurter
      - key: CORS_ORIGIN
        value: "*"

  - type: static_site
    name: justsplitapp-dev
    branch: dev
    rootDir: apps/web
    buildCommand: pnpm i --frozen-lockfile && pnpm --filter apps/web build
    publishPath: apps/web/dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: http://api.justsplitapp-dev.onrender.com:4000
      - key: VITE_WS_URL
        value: ws://api.justsplitapp-dev.onrender.com:4000
      - key: VITE_FEATURE_FLAGS
        fromGroup: justsplitapp-dev

  # Production Services
  - type: web
    name: api-justsplitapp-prod
    env: node
    branch: main
    rootDir: apps/server
    buildCommand: pnpm i --frozen-lockfile && pnpm --filter apps/server build
    startCommand: pnpm --filter apps/server start
    autoDeploy: true
    healthCheck:
      path: /health
      port: 4000
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: FEATURE_FLAGS
        fromGroup: justsplitapp-prod
      - key: MONGODB_URI
        fromGroup: justsplitapp-prod
      - key: JWT_SECRET
        fromGroup: justsplitapp-prod
      - key: FOURSQUARE_API_KEY
        fromGroup: justsplitapp-prod
      - key: CURRENCY_PROVIDER
        value: frankfurter
      - key: CORS_ORIGIN
        value: https://justsplit.app

  - type: static_site
    name: justsplitapp-prod
    branch: main
    rootDir: apps/web
    buildCommand: pnpm i --frozen-lockfile && pnpm --filter apps/web build
    publishPath: apps/web/dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://api.justsplit.app:4000
      - key: VITE_WS_URL
        value: wss://api.justsplit.app:4000
      - key: VITE_FEATURE_FLAGS
        fromGroup: justsplitapp-prod

envVarGroups:
  - name: justsplitapp-dev
    envVars:
      - key: FEATURE_FLAGS
        value: recommendations:true,ocr:true,chat:true
      - key: MONGODB_URI
        value: REPLACE_WITH_DEV_MONGODB_ATLAS_URI
      - key: JWT_SECRET
        generateValue: true
      - key: FOURSQUARE_API_KEY
        value: REPLACE_WITH_DEV_FSQ_KEY

  - name: justsplitapp-prod
    envVars:
      - key: FEATURE_FLAGS
        value: recommendations:false,ocr:true,chat:true
      - key: MONGODB_URI
        value: REPLACE_WITH_PROD_MONGODB_ATLAS_URI
      - key: JWT_SECRET
        generateValue: true
      - key: FOURSQUARE_API_KEY
        value: REPLACE_WITH_PROD_FSQ_KEY

databases:
  - name: justsplitapp-db
    databaseName: justsplitapp
    user: justsplitapp
